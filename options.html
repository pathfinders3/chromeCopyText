<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Ctrl Click Copier 옵션</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #121212;
      color: #f1f1f1;
    }

    h2 {
      color: #ffffff;
    }

    label {
      display: block;
      margin: 12px 0;
      cursor: pointer;
    }

    input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #bd6514/* 원하는 색으로 변경 */
    }
	
    input[type="radio"] {
      appearance: none;

      /* 미선택 상태 스타일 */
      width: 16px;
      height: 16px;
      border: 2px solid #555555;   /* 테두리 색 */
      border-radius: 50%;
      background: #2a2a2a;         /* 배경 색 */
      margin-right: 8px;
      cursor: pointer;
      position: relative;
      top: 3px;
      transition: all 0.15s ease;
    }

    input[type="radio"]:checked {
      /* 선택 상태 스타일 */
      border-color: #bd6514;
      background: radial-gradient(circle, #bd6514 40%, transparent 45%);
    }
	    

    hr {
      border-color: rgba(255, 255, 255, 0.15);
      margin: 18px 0;
    }

    #status {
      margin-top: 16px;
      color: #9cdcfe;
    }
  </style>
</head>
<body>
  <h2>복사 기준 선택</h2>

  <label>
    <input type="radio" name="copyMode" value="tag">
    p / div / li 태그 기준
  </label>

  <br>

  <label>
    <input type="radio" name="copyMode" value="sentence">
    마침표(.) 기준 문장
  </label>

  <label>
    <input type="radio" name="copyMode" value="pattern">
    코드 패턴 기준 (ABC-123)
  </label>

  <label>
    <input type="radio" name="copyMode" value="date">
    날짜 기준 (2024.3.4. / 2020/1/2 / 2022-02-02)
  </label>

  <hr>
  
  <h2>누적 모드</h2>
  
  <label>
    <input type="checkbox" id="cumulativeMode">
    클립보드에 텍스트 누적 (기존 내용 + 새 텍스트)
  </label>

  <hr>

  <h2>단축키 세트</h2>

  <label>
    <input type="radio" name="shortcutGroup" value="1234">
    ALT+1/2/3/4 사용
  </label>

  <label>
    <input type="radio" name="shortcutGroup" value="5678">
    ALT+5/6/7/8 사용
  </label>

  <hr>

  <p>
    단축키(기본): Alt+1(태그), Alt+2(문장), Alt+3(코드 패턴), Alt+4(날짜), Alt+0(옵션 페이지 열기)
  </p>
  <p>
    단축키 세트에서 ALT+1~4 또는 ALT+5~8을 선택해 충돌을 피할 수 있습니다.
  </p>

  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
