<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Ctrl Click Copier 옵션</title>
</head>
<body>
  <h2>복사 기준 선택</h2>

  <label>
    <input type="radio" name="copyMode" value="tag">
    p / div / li 태그 기준

  <br>

  <label>
    <input type="radio" name="copyMode" value="sentence">
    마침표(.) 기준 문장
  </label>

  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
